<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BeStrong App</title>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0f0f;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .container {
      text-align: center;
      max-width: 500px;
      padding: 20px;
    }

    .app-image {
      width: 100%;
      max-width: 350px;
      border-radius: 20px;
      margin-bottom: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    h1 {
      font-size: 28px;
      margin-bottom: 10px;
    }

    p {
      color: #ccc;
      margin-bottom: 25px;
      font-size: 16px;
    }

    .btn {
      display: inline-block;
      padding: 15px 25px;
      font-size: 16px;
      background: #00c853;
      color: white;
      text-decoration: none;
      border-radius: 12px;
      font-weight: bold;
      transition: 0.3s;
    }

    .btn:hover {
      background: #00e676;
      transform: scale(1.05);
    }

    .badge {
      margin-top: 15px;
      width: 180px;
    }

    @media (max-width: 480px) {
      h1 {
        font-size: 22px;
      }

      .btn {
        width: 100%;
      }
    }
  </style>
</head>

<body>

  <div class="container">
    <img src="app-image.png" alt="BeStrong App" class="app-image"/>

    <h1>Transforma tu cuerpo 💪</h1>
    <p>Rutinas inteligentes, progreso real y resultados visibles.</p>

    <a 
      class="btn" 
      href="https://play.google.com/store/apps/details?id=com.BeStrong&pcampaignid=web_share" 
      target="_blank"
    >
      Descargar en Google Play
    </a>
  </div>

</body>
</html>
