<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BeStrong App</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: radial-gradient(circle at top, #1a1a1a, #0d0d0d);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .container {
      text-align: center;
      max-width: 420px;
      padding: 25px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(10px);
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
      animation: fadeIn 0.8s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .app-image {
      width: 100%;
      max-width: 300px;
      border-radius: 18px;
      margin-bottom: 20px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.7);
    }

    h1 {
      font-size: 26px;
      margin-bottom: 10px;
      line-height: 1.3;
    }

    p {
      color: #bfbfbf;
      margin-bottom: 25px;
      font-size: 15px;
    }

    .cta {
      display: flex;
      justify-content: center;
    }

    .playstore-btn {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      background: black;
      padding: 12px 18px;
      border-radius: 12px;
      text-decoration: none;
      transition: 0.25s;
      border: 1px solid rgba(255,255,255,0.1);
    }

    .playstore-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 10px 25px rgba(0,0,0,0.6);
    }

    .playstore-btn img {
      width: 28px;
    }

    .btn-text {
      text-align: left;
      line-height: 1.1;
    }

    .btn-text small {
      font-size: 11px;
      color: #aaa;
      display: block;
    }

    .btn-text strong {
      font-size: 15px;
      color: white;
    }

    @media (max-width: 480px) {
      .container {
        margin: 10px;
        padding: 20px;
      }

      h1 {
        font-size: 22px;
      }
    }
  </style>
</head>

<body>

  <div class="container">
    <img src="logo.jpg" alt="BeStrong App" class="app-image"/>

    <h1>Transforma tu cuerpo 💪</h1>
    <p>Rutinas inteligentes, progreso real y resultados visibles.</p>

    <div class="cta">
      <a 
        class="playstore-btn" 
        href="https://play.google.com/store/apps/details?id=com.BeStrong&pcampaignid=web_share" 
        target="_blank"
      >
        <img src="https://upload.wikimedia.org/wikipedia/commons/7/78/Google_Play_Store_badge_EN.svg" alt="Google Play"/>
        <div class="btn-text">
          <small>Disponible en</small>
          <strong>Google Play</strong>
        </div>
      </a>
    </div>
  </div>

</body>
</html>
